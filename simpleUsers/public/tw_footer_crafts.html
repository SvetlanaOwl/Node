<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/crafts.css">

</head>
<body 
    class="flex flex-col min-h-screen font-sans text-[#2c3e50] p-5"
    style="font-family: 'Segoe UI', sans-serif; background: linear-gradient(to right, #74ebd5, #ACB6E5);">
    
    <!--Header section-->
    <div id="header" class="header">
        <div id="header-left" class="header-left"></div>
        <div id="header-right" class="header-right"></div>
    </div>

    <div class="flex-1">

    <ul id="craftList" class="list-none pb-5"></ul>
    </div>

    <footer id="footer" class="bg-[#2d6cdf] text-white py-2 w-full text-center font-bold"></footer>
    
    <script type="module">
        import { loadHeader } from "/js/header.js";
        import { loadCrafts } from "/js/crafts.js";
        import { loadFooter } from "/js/footer.js";
        
        loadHeader();
        loadCrafts();
        loadFooter();

</html>
