<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Login</title>
         <!-- Подключаем CDN Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/550439dde7.js" crossorigin="anonymous"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5]">
    <div class="w-full max-w-md p-6 rounded-lg shadow-xl bg-white">
        <h2 id="loginMessage" class="mb-6 text-lg font-semibold text-center"></h2>
                
        <form id="login-box" class="space-y-4">
            <div class="relative">
            <i class="absolute top-1/2 -translate-y-1/2 left-4 fa-solid fa-user text-gray-500"></i>
            <input id="username" type="text" placeholder="Username" class="block w-full px-4 py-2 mt-2 text-gray-700 bg-white border border-gray-300 rounded-md pl-10">
            </div>
            <div class="relative">
            <i class="absolute top-1/2 -translate-y-1/2 left-4 fa-solid fa-lock text-gray-500"></i>
            <input id="password" type="password" placeholder="Password" class="block w-full px-4 py-2 mt-2 text-gray-700 bg-white border border-gray-300 rounded-md pl-10">
            </div>
            <button type="submit" class="w-full px-4 py-2 text-lg font-medium text-white bg-blue-500 rounded-md hover:bg-blue-600">Log In</button>
    
            <p id="login-result" class="mt-4 text-sm text-red-500 hidden"></p>
        </form>
    </div>

    <script type="module">
    import { initLogin } from "/js/login.js";
    import { loginMessage } from "/js/loginMessage.js";
    
    initLogin();
    loginMessage("loginMessage", "Hello,", "Please log in!", 2000);
    </script>
</body>
</html>
