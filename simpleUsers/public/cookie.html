<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Manager</title>
    <style>
        body {
            background: rgba(2, 29, 43, 0.854);
        }
        button {
        margin: 5px;
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 10px;
        }
    </style>
    </head>
    <body>
    <div>
        <button id="displayCookies">Display All Cookies</button>
        <button id="createCookie1">Create Cookie 1</button>
        <button id="createCookie2">Create Cookie 2</button>
        <button id="deleteCookie1">Delete Cookie 1</button>
        <button id="deleteCookie2">Delete Cookie 2</button>
    </div>
    <div id="showButtons"></div>

    <script type="module">
    import { displayAllCookies, createCookie, deleteCookie } from "/js/cookie.js";
        
    // Обработчики кликов для кнопок
    document.getElementById('displayCookies').addEventListener('click', displayAllCookies);

    document.getElementById('createCookie1').addEventListener('click', () => {
    createCookie('cookie1', 'value1', 7); 
    displayAllCookies();
    });

    document.getElementById('createCookie2').addEventListener('click', () => {
    createCookie('cookie2', 'value2', 10); 
    displayAllCookies();
    });

    document.getElementById('deleteCookie1').addEventListener('click', () => {
    deleteCookie('cookie1');
    displayAllCookies();
    });

    document.getElementById('deleteCookie2').addEventListener('click', () => {
    deleteCookie('cookie2');
    displayAllCookies();
    });

    displayAllCookies();
    </script>
</body>
</html>
