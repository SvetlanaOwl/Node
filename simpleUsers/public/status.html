<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status</title>
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/status.css">
    <style>
        button {
        margin: 15px;
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 10px;
        }
    </style>
</head>
<body>
    <!--header Section-->
    <div id="header" class="header">
        <div class="header-left" id="header-left"></div>
        <div class="header-right" id="header-right"></div>
    </div>
        
    <div class="status-wrapper">
        <div class="status-card">
            <div class="status-title">System Status</div>

            <div id="statusDisplay" class="status-text">
                Loading status...
            </div>

            <div id="timestamp" class="timestamp"></div>

            <button class="refresh-btn" id="refreshBtn">Refresh</button>
        </div>
    </div>

    <div id="cookieButtons">
        <button id="createCookie1">Create Cookie 1</button>
        <button id="createCookie2">Create Cookie 2</button>
        <button id="deleteCookie1">Delete Cookie 1</button>
        <button id="deleteCookie2">Delete Cookie 2</button>
    </div>
    <h4><strong>List of all cookies:</strong></h4>
    <div id="showButtons"></div>
    
    <script type="module">
        import { loadHeader } from "/js/header.js";
        import { loadStatus } from "/js/loadStatus.js";
        import { btnCreate1, btnCreate2, btnDelete1, btnDelete2 } from '/js/buttonManager.js';

        loadHeader();
        loadStatus();
        displayAllCookies();
    
    </script>
</body>
</html>
