<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Crafts</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col h-screen justify-between p-4 text-gray-800 bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5]">    
    
     <div id="header" class="bg-[#2d6cdf] justify-between flex p-4 sticky top-0 z-50">
        <div id="header-left" class="text-gray-300 px-3 py-2 space-x-4"></div>
        <div id="header-right" class="text-gray-300 px-3 py-2 flex space-x-4 h-16 w-16"></div>
    </div>
        
    <h2 class="text-2xl font-bold mb-4">List of Sea Crafts</h2>

    <ul id="craftList" class="rounded-md grid grid-cols-5 gap-4"></ul>

    <footer id="footer" class="bg-[#2d6cdf] text-white py-2 w-full text-center font-bold">
    
    <script type="module">
        import { loadHeader } from "/js/header.js";
        import { loadCrafts } from "/js/crafts.js";
        import { loadFooter } from "/js/footer.js";
        
        loadHeader();
        loadCrafts();
        loadFooter();
    </script>
</body>
</html>
