<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="/css/headerAndFooter.css">

</head>
<body 
    class="min-h-screen font-sans text-[#2c3e50] p-5"

    <script type="module">
        import { loadHeader } from "/js/header.js";
        import { loadCrafts } from "/js/crafts.js";

        loadHeader();
