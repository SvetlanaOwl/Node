<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS Dark Mode</title>
    <script src="https:cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-800 ultra-dark:bg-[#050505]">
    <div class="bg-white text-black dark:bg-gray-900 dark:text-white">
        Hello world
    </div>
    <button class="dark:text-white" id="themeToggle">Toggle theme</button>
    <button onclick="ultraDarkBody()">Ultra Dark theme</button>
</body>
<script>
    //Restore theme on page load
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
    }
    //Toggle theme on button click
    const toggle = document.getElementById('themeToggle');

    toggle.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
    //Save the new theme
    const isDark = document.documentElement.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    function ultraDarkBody() {
        document.documentElement.classList.add('ultra-dark');
        localStorage.setItem('theme', 'ultra-dark');
    }

    // При загрузке проверяем, был ли включён ультра-тёмный
    if (localStorage.getItem('theme') === 'ultra-dark') {
        document.documentElement.classList.add('ultra-dark');
    }
</script>
</html>
