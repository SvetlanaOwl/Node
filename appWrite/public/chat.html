<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="./css/chatRoom.css">
    <!--Include the appwrite web SDK via CDN-->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@23.0.0"></script>
    <script src="./js/tailwind.config.js"></script>
<style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .chat-container {
        background-image: 
            linear-gradient(rgba(255,255,255,0.25), rgba(116, 235, 213, 0.35)),
                url('https://images.unsplash.com/photo-1578662996442-48f60103fc96?q=80&w=2070');
        background-size: cover;
        background-position: center;
    }
</style>
</head>
<body class="text-white h-screen overflow-hidden flex flex-col">
    <!-- Top Header -->
    <header class="bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center justify-between md:hidden">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center text-xl">💬</div>
            <div>
                <h1 class="font-bold">Forest Room</h1>
            </div>
        </div>
        <button class="text-sm bg-red-600 px-4 py-1 rounded-xl">Leave</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Left Sidebar -->
        <div class="bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5] dark:bg-gradient-to-r dark:from-[#0f766e] dark:to-[#1e3a8a] border-r border-gray-800 w-72 flex-col hidden md:flex">
            <div class="flex-1 overflow-y-auto p-4 space-y-8">
                <div class="space-y-1">
                    <div class="px-4 py-2 hover:bg-gray-800 rounded-xl flex items-center gap-3 text-gray-300">
                        <i class="fa-solid fa-address-book"></i> Profile
                        <i class="fa-solid fa-angle-right"></i>
                        <a href="./profile.html"><p id="profileUsername">User</p></a>
                    </div>
                    <div class="px-4 py-2 hover:bg-gray-800 rounded-xl flex items-center gap-3 text-gray-300">
                        <i class="fa-solid fa-archway"></i> <a href="./lobby.html">Lobby</a>
                    </div>
                    <div class="px-4 py-2 hover:bg-gray-800 rounded-xl flex items-center gap-3 text-gray-300">
                        <i class="fa-solid fa-blog"></i> <a href="./blog.html">Blog</a>
                    </div>
                </div>
                <div>
                    <div class="px-4 text-xs font-semibold text-gray-400 mb-3">POPULAR ROOMS</div>
                    <div class="mx-2 bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5] dark:bg-gradient-to-r dark:from-[#0f766e] dark:to-[#1e3a8a] rounded-2xl p-3">
                        <div class="flex items-center gap-3 bg-gray-700 rounded-xl p-3">
                            <span class="text-2xl"><i class="fa-brands fa-rocketchat"></i></span>
                            <div>
                                <div class="font-semibold">ForesT</div>
                                <div class="text-sm text-gray-400">Lost in the leaves!</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Chat Header -->
        <div class="h-18 bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5] dark:bg-gradient-to-r dark:from-[#0f766e] dark:to-[#1e3a8a] border-b border-gray-800 flex items-center px-4 md:px-6 justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl md:hidden">💬</span>
                <div>
                    <div class="flex items-center gap-3 mt-2">
                        <img src="./img/forest.jpg" class="w-9 h-9 rounded-full p-1 bg-gradient-to-br from-green-400 to-green-600">
                        <h1 class="font-semibold text-lg">Forest 🌳</h1>
                    </div>
                    <p class="text-sm text-green-400">Theme🌲: Lost in the leaves!</p>
                </div>
            </div>
            <button class="hidden md:block bg-red-600 hover:bg-red-700 px-5 py-1.5 rounded-xl text-sm font-medium">
                Leave
            </button>
        </div>

        <!-- Messages -->
        <div id="chat-messages" 
        class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 chat-container bg-cover bg-center bg-blue-600">
        </div>
        
        <!-- Message Input -->
        <div class="p-4 bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5] dark:bg-gradient-to-r dark:from-[#0f766e] dark:to-[#1e3a8a] border-t border-gray-800">
            <span class="text-gray-400">
                 <!-- Обычные эмодзи -->
                <i class="far fa-smile pl-2 pb-2 cursor-pointer" id="emoji-button"></i>
                <!-- Анимированные эмодзи -->
                <i class="fa-solid fa-face-smile cursor-pointer" id="animatedEmoji-button"></i>
                <div id="emoji-panel" class="absolute hidden bg-white dark:bg-gray-800 p-2 rounded shadow-lg border 
                border-gray-200 dark:border-gray-700 z-50 w-64">
                    <div class="gap-2 text-xl cursor-pointer select-none">
                        <span>😀</span><span>😁</span><span>😂</span><span>🤣</span><span>😃</span><span>😄</span><span>😅</span><span>😆</span><span>😉</span>
                        <span>😊</span><span>😋</span><span>😎</span><span>😍</span><span>😘</span><span>🥰</span><span>😗</span><span>😙</span><span>😚</span>
                        <span>😛</span><span>😝</span><span>😜</span><span>🤪</span><span>🤨</span><span>🧐</span><span>🤓</span><span>😎</span><span>🤩</span>
                        <span>🥳</span><span>😏</span><span>😒</span><span>😞</span><span>😟</span><span>☹️</span><span>😖</span><span>😩</span><span>🥺</span>
                        <span>😢</span><span>😭</span><span>😤</span><span>😡</span><span>🤯</span><span>😳</span><span>🥶</span><span>😱</span><span>🤗</span>
                        <span>💋</span><span>💞</span><span>❤️</span><span>💘</span><span>🔥</span><span>🌙</span><span>🦉</span><span>🤝</span><span>🎄</span>
                        <span>👍</span><span>🌹</span>
                    </div>
                </div>
                <div id="animatedEmoji-panel" class="absolute hidden bg-white dark:bg-gray-800 p-2 rounded 
                    shadow-lg border border-gray-200 dark:border-gray-700 z-50 w-64 max-h-80 overflow-y-auto">
                        <div class="flex flex-wrap gap-2 text-xl cursor-pointer select-none">
                            <span><img src="./img/anime/icons8-heart.webp" class="w-6 h-6" data-emoji="heart"></span>
                            <span><img src="./img/anime/icons8-kiss-panda.webp" class="w-6 h-6" data-emoji="kiss-panda"></span>
                            <span><img src="./img/anime/icons8-star.webp" class="w-6 h-6" data-emoji="star"></span>
                            <span><img src="./img/anime/smecharic.webp" class="w-6 h-6" data-emoji="smecharic"></span>
                            <span><img src="./img/anime/smecharic-crosh.webp" class="w-6 h-6" data-emoji="crosh"></span>
                            <span><img src="./img/anime/smecharic-owl.webp" class="w-6 h-6" data-emoji="owl"></span>
                            <span><img src="./img/anime/crot-kiss.gif" class="w-6 h-6" data-emoji="crot"></span>
                            <span><img src="./img/anime/fire-blue.webp" class="w-6 h-6" data-emoji="fire"></span>
                            <span><img src="./img/anime/sun.webp" class="w-6 h-6" data-emoji="sun"></span>
                            <span><img src="./img/anime/stich-angry.webp" class="w-6 h-6" data-emoji="stich"></span>
                            <span><img src="./img/anime/cat-black.webp" class="w-6 h-6" data-emoji="catBlack"></span>
                            <span><img src="./img/anime/cat-gray-dance.webp" class="w-6 h-6" data-emoji="catDance"></span>
                            <span><img src="./img/anime/kitti-music.webp" class="w-6 h-6" data-emoji="kitti"></span>
                            <span><img src="./img/anime/sleep.webp" class="w-6 h-6" data-emoji="sleep"></span>
                        </div>
                    </div>
                
                <i class="fa-solid fa-upload pl-1"></i>
                <i class="fa-solid fa-microphone pl-1"></i>
                <i class="fa-solid fa-brush pl-1"></i>
            </span>
            <!--Chat input form-->
                <form id="chat-form" class="flex gap-3">
                    <div id="chat-input"
                    contenteditable="true"
                        class="flex-1 bg-gray-800 border border-gray-700 rounded-2xl px-5 py-3 
                        focus:outline-none focus:border-blue-500 text-sm
                        overflow-hidden whitespace-nowrap h-12"
                        placeholder="Type a message..."></div>
                    <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 px-6 md:px-8 rounded-2xl font-medium transition">
                    Send
                    </button>
                </form>
            </div>
        </div>
        
        <!-- Right Sidebar - Online Users -->
        <div class="w-72 bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5] dark:bg-gradient-to-r dark:from-[#0f766e] dark:to-[#1e3a8a] border-l border-gray-800 hidden lg:flex flex-col">
            <div class="p-4 h-14 font-semibold border-b border-gray-800"><i class="fa-solid fa-users"></i> Users Online</div>
            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="flex items-center gap-3">
                    <img src="./img/wolf.jpg" class="w-9 h-9 rounded-full">
                    <div>
                        <div class="font-medium">AlexSensei  <i class="fa-solid fa-chess-king text-yellow-400"></i></div>
                        <div class="text-xs text-yellow-400">Admin</div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    
                    <img src="https://i.pravatar.cc/40?u=2" class="w-9 h-9 rounded-full">
                    <div>
                        <div class="font-medium">Vasyandr <i class="fa-solid fa-face-grin-tongue-wink text-gray-400"></i></div>
                        <div class="text-xs text-gray-400">Дурачок</div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <img src="https://i.pravatar.cc/40?u=3" class="w-9 h-9 rounded-full">
                    <div>
                        <div class="font-medium">CoBaMod <i class="fa-solid fa-shield text-purple-400"></i></div>
                        <div class="text-xs text-purple-400">Moderator</div>
                    </div>
                </div>
            </div>
        </div>
    </div>    
<script type="module">
import { simulateChat } from './js/chatSimulator.js';
import { displayUser, setupEmojiPicker } from './js/chatUtils.js';
import { themeSwitcher } from './js/themeSwitcher.js';

themeSwitcher();
displayUser();
simulateChat();
setupEmojiPicker({buttonId: 'emoji-button', panelId: 'emoji-panel', animated: false }); //Stattic emojis
setupEmojiPicker({buttonId: 'animatedEmoji-button', panelId: 'animatedEmoji-panel', animated: true}); //animated emojis (gifs or webp)
</script>
</body> 
</html>
