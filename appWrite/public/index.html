<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appwrite Login Page</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Include the Appwrite Web SDK via CDN -->
    <script src="./js/tailwind.config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@23.0.0"></script>
</head>
<style>
@import './css/utils.css'; 
@import './css/tailwind.css';
</style>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5]">
    <div class="w-full max-w-sm bg-white shadow-md rounded-lg p-8">
        <div class="flex items-center justify-between">
        <h2 id = "loginMessage" class="text-2xl font-semibold text-center mb-6">Sign In</h2>
        <!-- Night mode toggle -->
            <button id="themeToggle" class="p-2 rounded">
                <!-- Light mode icon (moon) -->
                <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" />
                </svg>
                <!-- Dark mode icon (sun) -->
                <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden dark:block text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364 6.364l-1.414-1.414M7.05 7.05L5.636 5.636m12.728 0l-1.414 1.414M7.05 16.95l-1.414 1.414" />
                </svg>
            </button>
        </div>
        <form id="loginForm" class="space-y-4">
            <!-- Username -->
            <div class="flex items-center border border-gray-300 rounded-md px-3 py-2 shadow-sm">
                <i class="fa-solid fa-user text-gray-400"></i>
                <input type="email" id="loginEmail" class="ml-3 w-full bg-transparent focus:outline-none" placeholder="Email" required>
            </div>
            <!-- Password -->
            <div class="flex items-center border border-gray-300 rounded-md px-3 py-2 shadow-sm">
                <i class="fa-solid fa-lock text-gray-400"></i>
                <input type="password" id="loginPassword" class="ml-3 w-full bg-transparent focus:outline-none" placeholder="Password" required>
            </div>
            <!-- Login Button -->
            <button type="button" id="loginBtn" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600">Login</button>
        </form>

        <form id="registrationForm">
            <p class="text-center text-sm text-gray-600">
                Not registered yet? Register <a href="./register.html" class="text-blue-500 hover:underline">here</a>
            </p>
        </form>
    </div>
    <script type="module">
        import { login } from './js/appwriteUtils.js';
        login();
    </script>
</body>
</html>
