<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Include the Appwrite Web SDK via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@23.0.0"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="min-h-screen bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5]">
    <!-- HEADER --> 
    <header class="bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        
            <!-- Logo -->
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-[#74ebd5] to-[#ACB6E5] rounded-2xl flex items-center justify-center text-white font-bold text-2xl shadow-inner">
                    W
                </div>
                <span class="font-semibold text-2xl tracking-tight text-gray-800">Wolf&Owl Hub</span>
            </div>

            <!-- Navigation -->
            <nav id="header-nav" class="hidden md:flex items-center gap-8 text-gray-600 font-medium">
                <!-- Menu item will be injected here ===== Сюда будут добавляться пункты меню через JavaScript -->
            </nav>

            <!-- Right Side -->
            <div class="flex items-center gap-4">
                <!-- Search -->
                <div class="relative hidden sm:block">
                    <input type="text" 
                        placeholder="Search users..."
                        class="bg-gray-100 border border-transparent focus:border-gray-300 w-72 pl-10 py-2.5 rounded-3xl text-sm focus:outline-none">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>

                <!-- Notification -->
                <button class="w-10 h-10 flex items-center justify-center text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-2xl transition-colors relative">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="absolute top-2 right-2 w-4 h-4 bg-red-500 text-white text-[10px] font-bold flex items-center justify-center rounded-full">3</span>
                </button>

                <!-- Mini Profile -->
                <div id="profileWrapper" class="relative">
                    <div id="profileToggle" class="flex items-center gap-3 cursor-pointer select-none">
                        <div class="w-9 h-9 rounded-2xl overflow-hidden border-2 border-white shadow-sm">
                            <img src="/appWrite/public/img/wolf.jpg" 
                                alt="Avatar" 
                                class="w-full h-full object-cover">
                        </div>
                        <div class="hidden md:block">
                            <p class="text-sm font-semibold text-gray-800 leading-none" id="profileName">Username</p>
                        </div>
                    </div>

                    <!-- Dropdown -->
                    <div id="profileMenu" 
                        class="absolute right-0 mt-2 w-40 bg-white shadow-lg rounded-lg py-2 border border-gray-200 hidden">
                        <a href="/appWrite/public/menuAlex.html" 
                            class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                            Profile
                        </a>
                        
                        <button id="logoutBtn" 
                                class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                            Logout
                        </button>
                    </div>
                </div>
                
            </div>
        </div>
    </header>

    <div class="flex-1 flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden">

            <!-- Cover / Header -->
            <div class="h-48 bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5] relative">
                <div class="absolute -bottom-12 left-1/2 -translate-x-1/2">
                    <!-- Profile Picture -->
                    <div class="w-32 h-32 rounded-2xl overflow-hidden border-4 border-white shadow-lg">
                        <img id="profilePic" 
                            src="/appWrite/public/img/wolf.jpg"  
                            alt="Profile Picture" 
                            class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <div class="pt-16 pb-8 px-8">
                <!-- User Info -->
                <div class="text-center mb-8">
                    <h1 id="status" class="text-3xl font-bold text-center mb-6">Welcome: </h1>
                    <p id="userEmail" class="text-gray-500 mt-1"></p>
                    <div id="userRole" class="inline-flex items-center gap-1.5 mt-3 px-4 py-1 bg-emerald-100 text-emerald-700 rounded-full text-sm font-medium">
                        <i class="fas fa-check-circle"></i>
                        Verified User
                    </div>
                </div>

                <!-- Status -->
                <div id="status" class="text-center text-sm text-gray-400 mb-8">
                    Connected • Last active just now
                </div>

                <!-- Update Name Form -->
                <form id="updateNameForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
                        <input type="text" id="newName" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            placeholder="Enter new name">
                    </div>

                    <button type="button" id="updateNameBtn"
                            class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-semibold py-3.5 rounded-2xl transition-all duration-200 shadow-sm">
                        Update Name
                    </button>
                </form>

                <!-- Logout Button -->
                <button type="button" id="logoutBtn"
                        class="mt-6 w-full bg-red-50 hover:bg-red-100 text-red-600 font-medium py-3.5 rounded-2xl transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </button>

            </div>
        </div>
    </div>

    <script type="module">
        import { renderHeader } from './js/menu.js';
        import { initProfileMenu } from './js/profileMenu.js'
        import { logout } from './js/appwriteUtils.js';
       
        renderHeader();
        initProfileMenu(); 
        logout();
    </script>
</body>
</html>
