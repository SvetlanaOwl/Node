<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .chat-container {
        background-image: 
        linear-gradient(rgba(255,255,255,0.25), rgba(116,235,213,0.35)),
        url('https://images.unsplash.com/photo-1578662996442-48f60103fc96?q=80&w=2070');
        background-size: cover;
        background-position: center;
    }
</style>
</head>
<body class="text-white h-screen overflow-hidden flex flex-col">
    <!-- Top Header -->
    <header class="bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center justify-between md:hidden">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center text-xl">💬</div>
            <div>
                <h1 class="font-bold">Forest Room</h1>
            </div>
        </div>
        <button class="text-sm bg-red-600 px-4 py-1 rounded-xl">Leave</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Left Sidebar -->
        <div class="bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5] dark:bg-gradient-to-r dark:from-[#0f766e] dark:to-[#1e3a8a] border-r border-gray-800 w-72 flex-col hidden md:flex">
            <div ckass="'p-4 border-b border-gray-800">
                <div class='flex items-center gap-3'>
                    <div class="w-9 h-8 bg-blue-600 rounded-2xl flex items-center justify-center text-2xl">💬</div>
                    <span class="text-2xl font-bold">ChatRooms</span>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-8">
                <div class="space-y-1">
                    <div class="px-4 py-2 hover:bg-gray-800 rounded-xl flex items-center gap-3 text-gray-300">
                        🏠 Lobby
                    </div>
                    <div class="px-4 py-2 hover:bg-gray-800 rounded-xl flex items-center gap-3 text-gray-300">
                        📝 Blog
                    </div>
                </div>

                <div>
                    <div class="px-4 text-xs font-semibold text-gray-400 mb-3">POPULAR ROOMS</div>
                    <div class="mx-2 bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5] dark:bg-gradient-to-r dark:from-[#0f766e] dark:to-[#1e3a8a] rounded-2xl p-3">
                        <div class="flex items-center gap-3 bg-gray-700 rounded-xl p-3">
                            <span class="text-2xl">💬</span>
                            <div>
                                <div class="font-semibold">General Chat</div>
                                <div class="text-sm text-gray-400">Funny Chat</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Main Chat Area -->
        <div class="flex-1 flex flex-col min-w-0">
            <!-- Chat Header -->
            <div class="h-18 bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5] dark:bg-gradient-to-r dark:from-[#0f766e] dark:to-[#1e3a8a] border-b border-gray-800 flex items-center px-4 md:px-6 justify-between">
                <div class="flex items-center gap-3">
                    <span class="text-2xl md:hidden">💬</span>
                    <div>
                        <div class="flex items-center gap-3 mt-2">
                            <img src="./img/forest.png" class="w-9 h-9 rounded-full p-1 bg-gradient-to-br from-green-400 to-green-600">
                            <h1 class="font-semibold text-lg">Forest 🌳</h1>
                        </div>
                        <p class="text-sm text-green-400">Theme🌲: Lost in the leaves!</p>
                    </div>
                </div>
                <button class="hidden md:block bg-red-600 hover:bg-red-700 px-5 py-1.5 rounded-xl text-sm font-medium">
                    Leave
                </button>
            </div>

            <!-- Messages -->
            <div id="chat-messages" 
            class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 chat-container bg-cover bg-center">
            </div>
            <!-- Message Input -->
            <div class="p-4 bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5] dark:bg-gradient-to-r dark:from-[#0f766e] dark:to-[#1e3a8a] border-t border-gray-800">
                <span class="text-gray-400">
                    <i class="far fa-smile pl-2 pb-2"></i>
                    <i class="fa-solid fa-upload pl-1"></i>
                    <i class="fa-solid fa-microphone pl-1"></i>
                    <i class="fa-solid fa-brush pl-1"></i>
                </span>
                <form id="chat-form" class="flex gap-3">
                    <input id="chat-input"
                        class="flex-1 bg-gray-800 border border-gray-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-blue-500 text-sm"
                        placeholder="Type a message..." autocomplete="off">
                    <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 px-6 md:px-8 rounded-2xl font-medium transition">
                    Send
                    </button>
                </form>
            </div>
        </div>
        <!-- Right Sidebar - Online Users -->
        <div class="w-72 bg-gradient-to-r from-[#74ebd5] to-[#ACB6E5] dark:bg-gradient-to-r dark:from-[#0f766e] dark:to-[#1e3a8a] border-l border-gray-800 hidden lg:flex flex-col">
            <div class="p-4 font-semibold border-b border-gray-800">Users Online</div>
            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="flex items-center gap-3">
                    <img src="./img/Fire-Alex.png" class="w-9 h-9 rounded-full">
                    <div>
                        <div class="font-medium">AlexSensei 🔥</div>
                        <div class="text-xs text-yellow-400">Admin</div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                
                    <img src="https://i.pravatar.cc/40?u=2" class="w-9 h-9 rounded-full">
                    <div>
                        <div class="font-medium">Vasyandra 🐌</div>
                        <div class="text-xs text-gray-400">Дурачок</div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <img src="https://i.pravatar.cc/40?u=3" class="w-9 h-9 rounded-full">
                    <div>
                        <div class="font-medium">CoBaMod ❤️</div>
                        <div class="text-xs text-purple-400">Moderator</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script>
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');

    function addMessage(text, username = "You", isMine = true) {
        const div = document.createElement('div');
        div.className = `flex ${isMine ? 'justify-end' : 'justify-start'}`;

        div.innerHTML = `
            <div class="max-w-[85%] md:max-w-[70%]">
                ${isMine ? `<div class="text-blue-400 text-sm mb-1">${username}</div>` : ''}
                <div class="px-4 py-3 rounded-2xl ${isMine ? 'bg-blue-600' : 'bg-gray-700'}">
                    <p class="break-words">${text}</p>
                </div>
                <div class="text-xs text-gray-400 mt-1 text-right">${new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}</div>
            </div>
        `;

        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const msg = chatInput.value.trim();
        if (!msg) return;

        addMessage(msg);
        chatInput.value = '';

        setTimeout(() => {
            const replies = ["😂😂", "This is hilarious!", "I'm dead", "Same bro!", "No way!"];
            addMessage(replies[Math.floor(Math.random() * replies.length)], "VortexVIP", false);
        }, 800);
    });

    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') chatForm.dispatchEvent(new Event('submit'));
    });

    // Demo messages
    window.onload = () => {
        setTimeout(() => addMessage("This #oldtag should expire...", "❤️AlexSensei 🔥", false), 400);
        setTimeout(() => addMessage("Hey everyone! Loving the new update!", "Vasyandr 🐌", false), 1200);
        setTimeout(() => addMessage("Welcome to the chat! 🔥", "❤️CoBaMod ❤️", false), 2000);
    };
</script>

</body> 
</html>
